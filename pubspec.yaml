name: sudoku
description: "Sudoku Nova — a neon-styled local Sudoku puzzle game."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.0
  go_router: ^14.0.0
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  sqlite3: ^3.3.3
  path: ^1.9.0
  shared_preferences: ^2.2.0
  intl: ^0.19.0
  google_fonts: ^6.2.0
  flutter_animate: ^4.5.0
  audioplayers: ^6.0.0
  google_mobile_ads: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0D1117"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter_native_splash:
  color: "#0D1117"
  image: assets/icon/splash_logo.png
  android: true
  ios: false
  android_12:
    color: "#0D1117"
    image: assets/icon/splash_logo.png
    icon_background_color: "#0D1117"

hooks:
  user_defines:
    sqlite3:
      source: system
      # Use the versioned system library on Linux (no libsqlite3.so symlink without -dev package).
      name_linux: /usr/lib/x86_64-linux-gnu/libsqlite3.so.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/sounds/
